<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>交易记录</title>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f4f6fa;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --surface-hover: #f1f5f9;
            --text: #172033;
            --text-soft: #667085;
            --text-faint: #98a2b3;
            --line: #e4e7ec;
            --primary: #635bff;
            --primary-dark: #5148e5;
            --primary-soft: #eeecff;
            --success: #039855;
            --warning: #dc6803;
            --danger: #d92d20;
            --nav: #111827;
            --shadow: 0 12px 32px rgba(16, 24, 40, 0.07);
            --radius: 18px;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 0%, rgba(99, 91, 255, 0.08), transparent 28rem),
                var(--bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        button, input, textarea { font: inherit; }
        button { cursor: pointer; }

        .appbar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            min-height: 68px;
            padding: 12px max(20px, calc((100vw - 1380px) / 2));
            color: white;
            background: rgba(17, 24, 39, 0.96);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
        }
        .brand, .brand-mark, .appbar-actions, .sync-state, .button, .icon-button,
        .stat, .card-meta, .search-box, .toolbar, .empty-actions {
            display: flex;
            align-items: center;
        }
        .brand { gap: 12px; min-width: 0; }
        .brand-mark {
            justify-content: center;
            width: 38px;
            height: 38px;
            flex: 0 0 auto;
            border-radius: 12px;
            color: white;
            background: linear-gradient(145deg, #847dff, #635bff);
            box-shadow: 0 8px 22px rgba(99, 91, 255, 0.38);
            font-weight: 800;
        }
        .brand-copy { min-width: 0; }
        .brand-title { font-weight: 720; letter-spacing: 0.01em; }
        .brand-subtitle { margin-top: 1px; color: #98a2b3; font-size: 0.75rem; }
        .appbar-actions { gap: 9px; }
        .sync-state {
            gap: 7px;
            margin-right: 3px;
            color: #c7ced9;
            font-size: 0.78rem;
            white-space: nowrap;
        }
        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #98a2b3;
            box-shadow: 0 0 0 4px rgba(152, 162, 179, 0.12);
        }
        .sync-state[data-state="saved"] .sync-dot { background: #32d583; box-shadow: 0 0 0 4px rgba(50, 213, 131, 0.12); }
        .sync-state[data-state="saving"] .sync-dot { background: #fdb022; box-shadow: 0 0 0 4px rgba(253, 176, 34, 0.12); }
        .sync-state[data-state="offline"] .sync-dot { background: #f97066; box-shadow: 0 0 0 4px rgba(249, 112, 102, 0.12); }

        .button {
            justify-content: center;
            gap: 7px;
            min-height: 38px;
            padding: 8px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--text);
            background: var(--surface);
            font-weight: 650;
            font-size: 0.84rem;
            transition: 160ms ease;
        }
        .button:hover { transform: translateY(-1px); border-color: #cfd4dc; box-shadow: 0 5px 14px rgba(16, 24, 40, 0.08); }
        .button:active { transform: translateY(0); }
        .button-primary { color: white; border-color: var(--primary); background: var(--primary); }
        .button-primary:hover { border-color: var(--primary-dark); background: var(--primary-dark); }
        .button-nav { color: #e4e7ec; border-color: rgba(255,255,255,0.14); background: rgba(255,255,255,0.07); }
        .button-nav:hover { border-color: rgba(255,255,255,0.24); background: rgba(255,255,255,0.12); box-shadow: none; }
        .button-danger { color: var(--danger); }
        .button-quiet { background: transparent; }
        .button svg, .icon-button svg, .search-box svg { width: 17px; height: 17px; flex: 0 0 auto; }

        .page {
            width: min(1380px, calc(100% - 40px));
            margin: 0 auto;
            padding: 38px 0 64px;
        }
        .overview {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 28px;
            margin-bottom: 26px;
        }
        .eyebrow {
            margin: 0 0 8px;
            color: var(--primary);
            font-size: 0.77rem;
            font-weight: 800;
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }
        h1 { margin: 0; font-size: clamp(1.8rem, 3vw, 2.6rem); line-height: 1.12; letter-spacing: -0.045em; }
        .overview-copy { max-width: 650px; margin: 12px 0 0; color: var(--text-soft); font-size: 0.94rem; line-height: 1.7; }
        .stats { display: grid; grid-template-columns: repeat(3, minmax(108px, 1fr)); gap: 10px; }
        .stat {
            align-items: flex-start;
            flex-direction: column;
            min-width: 118px;
            padding: 13px 15px;
            border: 1px solid rgba(228, 231, 236, 0.9);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 6px 18px rgba(16, 24, 40, 0.035);
            backdrop-filter: blur(10px);
        }
        .stat strong { font-size: 1.12rem; line-height: 1.25; }
        .stat span { margin-top: 3px; color: var(--text-faint); font-size: 0.72rem; }

        .toolbar {
            position: relative;
            z-index: 5;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }
        .search-box {
            flex: 1 1 420px;
            max-width: 560px;
            gap: 10px;
            height: 43px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 12px;
            color: var(--text-faint);
            background: var(--surface);
            transition: 160ms ease;
        }
        .search-box:focus-within { border-color: rgba(99, 91, 255, 0.55); box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.1); }
        .search-box input { width: 100%; border: 0; outline: 0; color: var(--text); background: transparent; font-size: 0.88rem; }
        .search-box input::placeholder { color: var(--text-faint); }
        .search-shortcut { padding: 2px 6px; border: 1px solid var(--line); border-radius: 5px; color: var(--text-faint); background: var(--surface-soft); font-size: 0.67rem; }
        .toolbar-actions { position: relative; display: flex; gap: 9px; }
        .menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            display: none;
            width: 218px;
            padding: 6px;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: var(--surface);
            box-shadow: 0 16px 38px rgba(16, 24, 40, 0.16);
        }
        .menu.open { display: block; animation: pop 150ms ease; }
        .menu button {
            width: 100%;
            padding: 9px 10px;
            border: 0;
            border-radius: 8px;
            text-align: left;
            color: var(--text);
            background: transparent;
            font-size: 0.82rem;
        }
        .menu button:hover { background: var(--surface-hover); }
        .menu button.danger { color: var(--danger); }
        .menu-separator { height: 1px; margin: 5px 4px; background: var(--line); }

        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 400px), 1fr)); gap: 18px; align-items: start; }
        .record-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: border-color 170ms ease, box-shadow 170ms ease, transform 170ms ease;
        }
        .record-card:hover { border-color: #d6d9e0; box-shadow: 0 16px 42px rgba(16, 24, 40, 0.1); transform: translateY(-2px); }
        .record-card:focus-within { border-color: rgba(99, 91, 255, 0.48); box-shadow: 0 16px 42px rgba(16, 24, 40, 0.1), 0 0 0 3px rgba(99, 91, 255, 0.08); }
        .card-head {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 14px 14px 12px;
            border-bottom: 1px solid var(--line);
        }
        .record-index {
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 9px;
            color: var(--primary);
            background: var(--primary-soft);
            font-size: 0.72rem;
            font-weight: 800;
        }
        .title-input {
            width: 100%;
            min-width: 0;
            padding: 6px 7px;
            border: 1px solid transparent;
            border-radius: 7px;
            outline: 0;
            color: var(--text);
            background: transparent;
            font-weight: 720;
        }
        .title-input:hover { background: var(--surface-soft); }
        .title-input:focus { border-color: rgba(99, 91, 255, 0.35); background: var(--surface-soft); }
        .title-input::placeholder { color: var(--text-faint); font-weight: 600; }
        .card-actions { display: flex; gap: 3px; }
        .icon-button {
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 0;
            border-radius: 9px;
            color: var(--text-soft);
            background: transparent;
            transition: 150ms ease;
        }
        .icon-button:hover { color: var(--text); background: var(--surface-hover); }
        .icon-button.danger:hover { color: var(--danger); background: #fff1f0; }
        .record-body { padding: 14px; }
        .record-card.collapsed .record-body { display: none; }
        .record-card.collapsed .collapse-icon { transform: rotate(-90deg); }
        .record-text {
            display: block;
            width: 100%;
            min-height: 190px;
            resize: vertical;
            padding: 14px;
            border: 1px solid #e7e9ee;
            border-radius: 12px;
            outline: 0;
            color: #263042;
            background: var(--surface-soft);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 0.84rem;
            line-height: 1.7;
            transition: 160ms ease;
        }
        .record-text:hover { border-color: #d9dde5; }
        .record-text:focus { border-color: rgba(99, 91, 255, 0.5); background: white; box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.09); }
        .record-text::placeholder { color: #aab2c0; }
        .card-meta { justify-content: space-between; gap: 10px; margin-top: 10px; color: var(--text-faint); font-size: 0.7rem; }
        .card-meta strong { color: var(--text-soft); font-weight: 650; }

        .empty-state {
            display: none;
            place-items: center;
            min-height: 380px;
            padding: 40px 20px;
            border: 1px dashed #cfd4dc;
            border-radius: var(--radius);
            text-align: center;
            background: rgba(255,255,255,0.55);
        }
        .empty-state.visible { display: grid; }
        .empty-icon { display: grid; place-items: center; width: 58px; height: 58px; margin: 0 auto 16px; border-radius: 18px; color: var(--primary); background: var(--primary-soft); }
        .empty-icon svg { width: 27px; height: 27px; }
        .empty-state h2 { margin: 0; font-size: 1.05rem; }
        .empty-state p { max-width: 380px; margin: 8px auto 18px; color: var(--text-soft); font-size: 0.84rem; line-height: 1.6; }
        .empty-actions { justify-content: center; gap: 8px; }

        .toast-region { position: fixed; right: 22px; bottom: 22px; z-index: 100; display: grid; gap: 8px; pointer-events: none; }
        .toast {
            min-width: 230px;
            padding: 11px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 11px;
            color: white;
            background: #182230;
            box-shadow: 0 14px 35px rgba(16, 24, 40, 0.24);
            font-size: 0.8rem;
            animation: toast-in 180ms ease;
        }
        .dialog-backdrop {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            place-items: center;
            padding: 20px;
            background: rgba(16, 24, 40, 0.5);
            backdrop-filter: blur(5px);
        }
        .dialog-backdrop.open { display: grid; }
        .dialog {
            width: min(430px, 100%);
            padding: 22px;
            border-radius: 17px;
            background: var(--surface);
            box-shadow: 0 24px 60px rgba(16, 24, 40, 0.25);
            animation: pop 160ms ease;
        }
        .dialog h2 { margin: 0; font-size: 1.05rem; }
        .dialog p { margin: 9px 0 20px; color: var(--text-soft); font-size: 0.84rem; line-height: 1.6; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; }

        @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } }
        @keyframes pop { from { opacity: 0; transform: translateY(-4px) scale(0.98); } }

        @media (max-width: 900px) {
            .overview { grid-template-columns: 1fr; align-items: start; }
            .stats { width: 100%; }
            .stat { min-width: 0; }
        }
        @media (max-width: 680px) {
            .appbar { padding: 10px 14px; }
            .brand-subtitle, .sync-state span, .button-nav span { display: none; }
            .page { width: min(100% - 24px, 1380px); padding-top: 26px; }
            .toolbar { align-items: stretch; flex-direction: column; }
            .search-box { flex-basis: auto; max-width: none; }
            .toolbar-actions { justify-content: space-between; }
            .toolbar-actions > .button { flex: 1; }
            .stats { gap: 7px; }
            .stat { padding: 11px; }
            .stat strong { font-size: 1rem; }
            .record-card:hover { transform: none; }
            .toast-region { left: 12px; right: 12px; bottom: 12px; }
            .toast { min-width: 0; }
        }
    </style>
</head>
<body>
    <header class="appbar">
        <div class="brand">
            <div class="brand-mark">TR</div>
            <div class="brand-copy">
                <div class="brand-title">交易记录</div>
                <div class="brand-subtitle">轻量、专注、自动同步</div>
            </div>
        </div>
        <div class="appbar-actions">
            <div class="sync-state" id="syncState" data-state="loading" title="数据同步状态">
                <i class="sync-dot"></i>
                <span id="syncText">正在载入</span>
            </div>
            <button class="button button-nav" id="syncButton" type="button" title="立即同步（Ctrl/Cmd + S）">
                <svg aria-hidden="true"><use href="#icon-refresh"></use></svg><span>同步</span>
            </button>
            <button class="button button-primary" id="topAddButton" type="button">
                <svg aria-hidden="true"><use href="#icon-plus"></use></svg><span>新建记录</span>
            </button>
        </div>
    </header>

    <main class="page">
        <section class="overview">
            <div>
                <p class="eyebrow">Trade workspace</p>
                <h1>把每一次交易，都变成可复盘的经验。</h1>
                <p class="overview-copy">记录当下的判断、执行与结果。内容会自动保存到云端，并在浏览器中保留一份本地副本。</p>
            </div>
            <div class="stats" aria-label="记录统计">
                <div class="stat"><strong id="recordCount">0</strong><span>记录窗口</span></div>
                <div class="stat"><strong id="filledCount">0</strong><span>已有内容</span></div>
                <div class="stat"><strong id="charCount">0</strong><span>总字符</span></div>
            </div>
        </section>

        <section class="toolbar">
            <label class="search-box" for="searchInput">
                <svg aria-hidden="true"><use href="#icon-search"></use></svg>
                <input id="searchInput" type="search" autocomplete="off" placeholder="搜索标题或记录内容">
                <kbd class="search-shortcut">Ctrl K</kbd>
            </label>
            <div class="toolbar-actions">
                <button class="button" id="exportPdfButton" type="button">
                    <svg aria-hidden="true"><use href="#icon-file"></use></svg>导出 PDF
                </button>
                <button class="button" id="moreButton" type="button" aria-expanded="false">
                    <svg aria-hidden="true"><use href="#icon-more"></use></svg>更多
                </button>
                <div class="menu" id="moreMenu">
                    <button type="button" data-action="export-json">导出 JSON 备份</button>
                    <button type="button" data-action="import-json">从 JSON 恢复</button>
                    <div class="menu-separator"></div>
                    <button type="button" data-action="expand-all">展开全部窗口</button>
                    <button type="button" data-action="collapse-all">折叠全部窗口</button>
                    <div class="menu-separator"></div>
                    <button type="button" class="danger" data-action="clear-content">清空所有记录内容</button>
                    <button type="button" class="danger" data-action="delete-all">删除所有窗口</button>
                </div>
            </div>
        </section>

        <section class="records-grid" id="recordsGrid" aria-live="polite"></section>
        <section class="empty-state" id="emptyState">
            <div>
                <div class="empty-icon"><svg aria-hidden="true"><use href="#icon-note"></use></svg></div>
                <h2 id="emptyTitle">还没有交易记录</h2>
                <p id="emptyText">新建一个窗口，写下本次交易的计划、执行和复盘。</p>
                <div class="empty-actions">
                    <button class="button button-primary" id="emptyAddButton" type="button">
                        <svg aria-hidden="true"><use href="#icon-plus"></use></svg>新建第一条记录
                    </button>
                    <button class="button" id="clearSearchButton" type="button" hidden>清除搜索</button>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-region" id="toastRegion" aria-live="polite"></div>
    <input id="importInput" type="file" accept="application/json,.json" hidden>

    <div class="dialog-backdrop" id="confirmBackdrop" role="presentation">
        <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h2 id="confirmTitle">确认操作</h2>
            <p id="confirmMessage"></p>
            <div class="dialog-actions">
                <button class="button" id="confirmCancel" type="button">取消</button>
                <button class="button button-danger" id="confirmAccept" type="button">确认</button>
            </div>
        </div>
    </div>

    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.9-4M4 4v5h5m-5 4a8 8 0 0 0 14.9 4M20 20v-5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="m16 16 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="icon-file" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7zM14 3v5h5M9.5 13h5M9.5 17h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="icon-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="8" y="8" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M5 7h14m-9-3h4l1 3H9zm-3 3 1 13h8l1-13M10 11v5m4-5v5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m7 10 5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
        <symbol id="icon-note" viewBox="0 0 24 24"><path d="M6 3h12v18H6zM9 8h6m-6 4h6m-6 4h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    </svg>

    <script>
        const DEFAULT_WORKER_URL = 'https://tempest07.weiqian-yu.workers.dev';
        const API_BASE = ['localhost', '127.0.0.1'].includes(location.hostname)
            ? ''
            : (window.TRADE_RECORDER_API_BASE || DEFAULT_WORKER_URL).replace(/\/+$/, '');
        const CACHE_KEY = 'trade-recorder-cache-v2';
        const MAX_TITLE_LENGTH = 200;
        const MAX_CONTENT_LENGTH = 200000;

        let store = { windows: [], nextId: 1, updatedAt: null };
        let searchQuery = '';
        let saveTimer = null;
        let saving = false;
        let saveAgain = false;
        let changeVersion = 0;
        let confirmResolver = null;

        const $ = (selector) => document.querySelector(selector);
        const grid = $('#recordsGrid');
        const emptyState = $('#emptyState');
        const searchInput = $('#searchInput');
        const moreMenu = $('#moreMenu');

        function normalizeStore(raw) {
            const source = raw && typeof raw === 'object' ? raw : {};
            const usedIds = new Set();
            const windows = Array.isArray(source.windows) ? source.windows.slice(0, 500).map((item, index) => {
                const record = item && typeof item === 'object' ? item : {};
                let id = Number.isInteger(record.id) && record.id > 0 ? record.id : index + 1;
                while (usedIds.has(id)) id += 1;
                usedIds.add(id);
                return {
                    id,
                    title: String(record.title || '').slice(0, MAX_TITLE_LENGTH),
                    content: String(record.content || '').slice(0, MAX_CONTENT_LENGTH),
                    collapsed: Boolean(record.collapsed),
                    createdAt: validDate(record.createdAt) || new Date().toISOString(),
                    updatedAt: validDate(record.updatedAt) || validDate(source.updatedAt) || new Date().toISOString()
                };
            }) : [];
            const highestId = windows.reduce((max, item) => Math.max(max, item.id), 0);
            return {
                windows,
                nextId: Math.max(Number.isInteger(source.nextId) ? source.nextId : 1, highestId + 1),
                updatedAt: validDate(source.updatedAt)
            };
        }

        function validDate(value) {
            if (typeof value !== 'string' || Number.isNaN(Date.parse(value))) return null;
            return value;
        }

        function payload() {
            return {
                windows: store.windows.map(({ id, title, content, collapsed, createdAt, updatedAt }) => ({
                    id, title, content, collapsed, createdAt, updatedAt
                })),
                nextId: store.nextId,
                updatedAt: store.updatedAt
            };
        }

        function cacheLocally() {
            localStorage.setItem(CACHE_KEY, JSON.stringify(payload()));
        }

        function setSyncState(state, text) {
            $('#syncState').dataset.state = state;
            $('#syncText').textContent = text;
        }

        function markChanged({ render = false, delay = 700 } = {}) {
            store.updatedAt = new Date().toISOString();
            changeVersion += 1;
            cacheLocally();
            setSyncState('saving', '等待同步');
            updateStats();
            if (render) renderRecords();
            clearTimeout(saveTimer);
            saveTimer = setTimeout(flushSave, delay);
        }

        async function flushSave({ notify = false } = {}) {
            clearTimeout(saveTimer);
            if (saving) {
                saveAgain = true;
                return false;
            }
            saving = true;
            let success = false;
            const savingVersion = changeVersion;
            setSyncState('saving', '正在同步');
            try {
                const response = await fetch(`${API_BASE}/api/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload())
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                success = true;
                if (savingVersion === changeVersion) setSyncState('saved', '已同步');
                if (notify) toast('数据已同步');
            } catch (error) {
                setSyncState('offline', '仅保存在本机');
                if (notify) toast('云端同步失败，本机副本已保留');
            } finally {
                saving = false;
                if (saveAgain || savingVersion !== changeVersion) {
                    saveAgain = false;
                    setTimeout(flushSave, 80);
                }
            }
            return success;
        }

        async function loadData() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    store = normalizeStore(JSON.parse(cached));
                    renderRecords();
                    setSyncState('saving', '正在检查云端');
                } catch (_) {
                    localStorage.removeItem(CACHE_KEY);
                }
            } else {
                renderRecords();
            }

            try {
                const response = await fetch(`${API_BASE}/api/data`, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const remote = normalizeStore(await response.json());
                const remoteTime = Date.parse(remote.updatedAt || 0);
                const localTime = Date.parse(store.updatedAt || 0);
                let synced = true;
                if (!cached || remoteTime >= localTime) {
                    store = remote;
                    cacheLocally();
                    renderRecords();
                } else {
                    changeVersion += 1;
                    synced = await flushSave();
                }
                if (synced) setSyncState('saved', '已同步');
            } catch (error) {
                setSyncState('offline', cached ? '使用本机副本' : '当前离线');
                if (!cached) toast('无法连接云端，可继续记录并稍后同步');
            }
        }

        function updateStats() {
            const filled = store.windows.filter(item => item.content.trim()).length;
            const chars = store.windows.reduce((sum, item) => sum + item.content.length, 0);
            $('#recordCount').textContent = String(store.windows.length);
            $('#filledCount').textContent = String(filled);
            $('#charCount').textContent = chars.toLocaleString('zh-CN');
        }

        function filteredRecords() {
            const query = searchQuery.trim().toLocaleLowerCase('zh-CN');
            if (!query) return store.windows;
            return store.windows.filter(item =>
                item.title.toLocaleLowerCase('zh-CN').includes(query) ||
                item.content.toLocaleLowerCase('zh-CN').includes(query)
            );
        }

        function renderRecords({ focusId = null } = {}) {
            const records = filteredRecords();
            grid.replaceChildren(...records.map((record) => createRecordCard(record)));
            const noResults = Boolean(searchQuery.trim()) && store.windows.length > 0 && records.length === 0;
            emptyState.classList.toggle('visible', records.length === 0);
            $('#emptyTitle').textContent = noResults ? '没有匹配的记录' : '还没有交易记录';
            $('#emptyText').textContent = noResults ? '换一个关键词试试，或清除当前搜索。' : '新建一个窗口，写下本次交易的计划、执行和复盘。';
            $('#emptyAddButton').hidden = noResults;
            $('#clearSearchButton').hidden = !noResults;
            updateStats();
            if (focusId !== null) {
                requestAnimationFrame(() => {
                    const input = grid.querySelector(`[data-record-id="${focusId}"] .title-input`);
                    input?.focus();
                });
            }
        }

        function createRecordCard(record) {
            const index = store.windows.indexOf(record) + 1;
            const card = document.createElement('article');
            card.className = `record-card${record.collapsed ? ' collapsed' : ''}`;
            card.dataset.recordId = record.id;

            const head = document.createElement('div');
            head.className = 'card-head';
            const number = document.createElement('span');
            number.className = 'record-index';
            number.textContent = String(index).padStart(2, '0');
            const title = document.createElement('input');
            title.className = 'title-input';
            title.value = record.title;
            title.maxLength = MAX_TITLE_LENGTH;
            title.placeholder = '为这条记录命名';
            title.setAttribute('aria-label', `第 ${index} 条记录标题`);
            title.addEventListener('input', () => {
                record.title = title.value;
                record.updatedAt = new Date().toISOString();
                markChanged();
            });

            const actions = document.createElement('div');
            actions.className = 'card-actions';
            actions.append(
                iconButton('复制窗口', 'icon-copy', () => duplicateRecord(record.id)),
                iconButton(record.collapsed ? '展开窗口' : '折叠窗口', 'icon-chevron', () => {
                    record.collapsed = !record.collapsed;
                    markChanged({ render: true });
                }, 'collapse-icon'),
                iconButton('删除窗口', 'icon-trash', () => deleteRecord(record.id), 'danger')
            );
            head.append(number, title, actions);

            const body = document.createElement('div');
            body.className = 'record-body';
            const textarea = document.createElement('textarea');
            textarea.className = 'record-text';
            textarea.value = record.content;
            textarea.maxLength = MAX_CONTENT_LENGTH;
            textarea.placeholder = '记录交易计划、入场理由、执行过程与复盘结果...';
            textarea.setAttribute('aria-label', `${record.title || `第 ${index} 条`}记录内容`);
            const charLabel = document.createElement('strong');
            charLabel.textContent = `${record.content.length.toLocaleString('zh-CN')} 字符`;
            const timeLabel = document.createElement('span');
            timeLabel.textContent = `更新于 ${formatTime(record.updatedAt)}`;
            textarea.addEventListener('input', () => {
                record.content = textarea.value;
                record.updatedAt = new Date().toISOString();
                charLabel.textContent = `${record.content.length.toLocaleString('zh-CN')} 字符`;
                timeLabel.textContent = '刚刚更新';
                markChanged();
            });
            const meta = document.createElement('div');
            meta.className = 'card-meta';
            meta.append(charLabel, timeLabel);
            body.append(textarea, meta);
            card.append(head, body);
            return card;
        }

        function iconButton(label, symbol, handler, className = '') {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `icon-button ${className}`.trim();
            button.title = label;
            button.setAttribute('aria-label', label);
            button.innerHTML = `<svg aria-hidden="true"><use href="#${symbol}"></use></svg>`;
            button.addEventListener('click', handler);
            return button;
        }

        function addRecord() {
            const now = new Date().toISOString();
            const record = { id: store.nextId++, title: '', content: '', collapsed: false, createdAt: now, updatedAt: now };
            store.windows.unshift(record);
            searchInput.value = '';
            searchQuery = '';
            markChanged();
            renderRecords({ focusId: record.id });
        }

        function duplicateRecord(id) {
            const sourceIndex = store.windows.findIndex(item => item.id === id);
            if (sourceIndex < 0) return;
            const source = store.windows[sourceIndex];
            const now = new Date().toISOString();
            const copy = {
                id: store.nextId++,
                title: source.title ? `${source.title}（副本）`.slice(0, MAX_TITLE_LENGTH) : '未命名记录（副本）',
                content: source.content,
                collapsed: false,
                createdAt: now,
                updatedAt: now
            };
            store.windows.splice(sourceIndex + 1, 0, copy);
            markChanged({ render: true });
            toast('已复制记录窗口');
        }

        async function deleteRecord(id) {
            const record = store.windows.find(item => item.id === id);
            if (!record) return;
            if ((record.title.trim() || record.content.trim()) &&
                !await askConfirm('删除这条记录？', '删除后将从云端和本机副本中移除。建议重要内容先导出备份。', '删除')) return;
            store.windows = store.windows.filter(item => item.id !== id);
            markChanged({ render: true, delay: 100 });
            toast('记录已删除');
        }

        function formatTime(value) {
            if (!validDate(value)) return '未知时间';
            const date = new Date(value);
            const today = new Date();
            const sameDay = date.toDateString() === today.toDateString();
            return new Intl.DateTimeFormat('zh-CN', sameDay
                ? { hour: '2-digit', minute: '2-digit', hour12: false }
                : { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }
            ).format(date);
        }

        function toast(message) {
            const item = document.createElement('div');
            item.className = 'toast';
            item.textContent = message;
            $('#toastRegion').appendChild(item);
            setTimeout(() => item.remove(), 2600);
        }

        function askConfirm(title, message, acceptText = '确认') {
            $('#confirmTitle').textContent = title;
            $('#confirmMessage').textContent = message;
            $('#confirmAccept').textContent = acceptText;
            $('#confirmBackdrop').classList.add('open');
            $('#confirmCancel').focus();
            return new Promise(resolve => { confirmResolver = resolve; });
        }

        function closeConfirm(result) {
            $('#confirmBackdrop').classList.remove('open');
            confirmResolver?.(result);
            confirmResolver = null;
        }

        function downloadBlob(blob, filename) {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        }

        function exportJson() {
            const stamp = new Date().toISOString().slice(0, 10);
            downloadBlob(new Blob([JSON.stringify(payload(), null, 2)], { type: 'application/json' }), `交易记录备份_${stamp}.json`);
            toast('JSON 备份已导出');
        }

        async function importJson(file) {
            try {
                const imported = normalizeStore(JSON.parse(await file.text()));
                if (!await askConfirm('恢复这份备份？', `将用备份中的 ${imported.windows.length} 个窗口替换当前全部数据。`, '恢复备份')) return;
                store = imported;
                store.updatedAt = new Date().toISOString();
                searchInput.value = '';
                searchQuery = '';
                markChanged({ render: true, delay: 100 });
                toast('备份已恢复');
            } catch (_) {
                toast('无法读取备份，请选择有效的 JSON 文件');
            } finally {
                $('#importInput').value = '';
            }
        }

        async function exportPdf() {
            if (typeof html2pdf === 'undefined') {
                toast('PDF 组件尚未加载，请稍后再试');
                return;
            }
            if (!store.windows.length) {
                toast('还没有可导出的记录');
                return;
            }
            const container = document.createElement('div');
            Object.assign(container.style, { width: '760px', padding: '28px', color: '#172033', background: '#fff', fontFamily: 'Arial, "Microsoft YaHei", sans-serif' });
            const title = document.createElement('h1');
            title.textContent = '交易记录汇总';
            Object.assign(title.style, { margin: '0 0 6px', fontSize: '25px' });
            const summary = document.createElement('p');
            summary.textContent = `${new Date().toLocaleString('zh-CN', { hour12: false })} · 共 ${store.windows.length} 个窗口`;
            Object.assign(summary.style, { margin: '0 0 22px', paddingBottom: '14px', color: '#667085', borderBottom: '2px solid #e4e7ec', fontSize: '12px' });
            container.append(title, summary);
            store.windows.forEach((record, index) => {
                const section = document.createElement('section');
                Object.assign(section.style, { marginBottom: '14px', padding: '14px', border: '1px solid #e4e7ec', borderRadius: '9px', pageBreakInside: 'avoid' });
                const heading = document.createElement('strong');
                heading.textContent = `${String(index + 1).padStart(2, '0')} · ${record.title.trim() || '未命名记录'}`;
                heading.style.fontSize = '14px';
                const content = document.createElement('div');
                content.textContent = record.content || '（无内容）';
                Object.assign(content.style, { marginTop: '8px', color: '#344054', fontFamily: 'Consolas, monospace', fontSize: '11px', lineHeight: '1.65', whiteSpace: 'pre-wrap', wordBreak: 'break-word' });
                section.append(heading, content);
                container.appendChild(section);
            });
            document.body.appendChild(container);
            toast('正在生成 PDF');
            try {
                await html2pdf().set({
                    margin: [8, 7, 8, 7],
                    filename: `交易记录_${new Date().toISOString().slice(0, 10)}.pdf`,
                    image: { type: 'jpeg', quality: 0.96 },
                    html2canvas: { scale: 2, backgroundColor: '#ffffff', logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['css', 'legacy'] }
                }).from(container).save();
            } catch (_) {
                toast('PDF 导出失败');
            } finally {
                container.remove();
            }
        }

        $('#topAddButton').addEventListener('click', addRecord);
        $('#emptyAddButton').addEventListener('click', addRecord);
        $('#syncButton').addEventListener('click', () => flushSave({ notify: true }));
        $('#exportPdfButton').addEventListener('click', exportPdf);
        $('#moreButton').addEventListener('click', (event) => {
            event.stopPropagation();
            const open = moreMenu.classList.toggle('open');
            $('#moreButton').setAttribute('aria-expanded', String(open));
        });
        document.addEventListener('click', () => {
            moreMenu.classList.remove('open');
            $('#moreButton').setAttribute('aria-expanded', 'false');
        });
        moreMenu.addEventListener('click', async (event) => {
            event.stopPropagation();
            const action = event.target.closest('button')?.dataset.action;
            if (!action) return;
            moreMenu.classList.remove('open');
            if (action === 'export-json') exportJson();
            if (action === 'import-json') $('#importInput').click();
            if (action === 'expand-all' || action === 'collapse-all') {
                store.windows.forEach(item => { item.collapsed = action === 'collapse-all'; });
                markChanged({ render: true });
            }
            if (action === 'clear-content') {
                if (!store.windows.some(item => item.content)) {
                    toast('当前没有需要清空的记录内容');
                    return;
                }
                if (!await askConfirm('清空所有记录内容？', '窗口标题会保留，但全部记录文本都会被清空。', '清空内容')) return;
                store.windows.forEach(item => { item.content = ''; item.updatedAt = new Date().toISOString(); });
                markChanged({ render: true, delay: 100 });
                toast('所有记录内容已清空');
            }
            if (action === 'delete-all') {
                if (!store.windows.length || !await askConfirm('删除所有窗口？', '全部标题和内容都会被删除，此操作无法直接撤销。', '全部删除')) return;
                store.windows = [];
                markChanged({ render: true, delay: 100 });
                toast('全部窗口已删除');
            }
        });
        $('#importInput').addEventListener('change', event => event.target.files[0] && importJson(event.target.files[0]));
        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value;
            renderRecords();
        });
        $('#clearSearchButton').addEventListener('click', () => {
            searchInput.value = '';
            searchQuery = '';
            renderRecords();
            searchInput.focus();
        });
        $('#confirmCancel').addEventListener('click', () => closeConfirm(false));
        $('#confirmAccept').addEventListener('click', () => closeConfirm(true));
        $('#confirmBackdrop').addEventListener('click', event => {
            if (event.target === $('#confirmBackdrop')) closeConfirm(false);
        });
        document.addEventListener('keydown', event => {
            const modifier = event.ctrlKey || event.metaKey;
            if (modifier && event.key.toLowerCase() === 'n') { event.preventDefault(); addRecord(); }
            if (modifier && event.key.toLowerCase() === 's') { event.preventDefault(); flushSave({ notify: true }); }
            if (modifier && event.key.toLowerCase() === 'k') { event.preventDefault(); searchInput.focus(); }
            if (event.key === 'Escape') {
                if ($('#confirmBackdrop').classList.contains('open')) closeConfirm(false);
                moreMenu.classList.remove('open');
            }
        });
        window.addEventListener('beforeunload', cacheLocally);

        loadData();
    </script>
</body>
</html>
