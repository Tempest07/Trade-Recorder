<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录管理器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7; --card-bg: #ffffff; --text: #1d1d1f;
            --border: #e8e8ed; --accent: #0071e3; --danger: #ff3b30;
            --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height:100vh; line-height:1.5;
        }

        /* 导航栏 */
        .navbar {
            position:sticky; top:0; z-index:100;
            background:rgba(255,255,255,0.9); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:8px 16px;
            display:flex; align-items:center; justify-content:space-between;
            gap:8px; flex-wrap:wrap;
        }
        .navbar-brand {
            display:flex; align-items:center; gap:6px; font-weight:700; font-size:1.1rem;
            white-space:nowrap;
        }
        .navbar-actions {
            display:flex; align-items:center; gap:6px; flex-wrap:wrap;
        }

        .btn {
            display:inline-flex; align-items:center; justify-content:center;
            gap:4px; padding:7px 12px; border-radius:18px;
            font-size:0.85rem; font-weight:500; cursor:pointer; border:none;
            transition:0.2s; font-family:inherit; background:#fff;
            white-space:nowrap; text-decoration:none;
        }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-outline { border:1.5px solid var(--border); }
        .btn-danger { border:1.5px solid #ffcccc; color:var(--danger); }

        .main-container { max-width:1300px; margin:0 auto; padding:16px; }
        .windows-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap:16px;
        }

        .window-card {
            background:#fff; border-radius:var(--radius);
            box-shadow:0 1px 4px rgba(0,0,0,0.06);
            border:1px solid var(--border); overflow:hidden;
            display:flex; flex-direction:column;
        }
        .card-header {
            display:flex; align-items:center; gap:6px;
            padding:12px 12px 6px;
        }
        .window-index {
            font-size:0.7rem; background:#f0f0f5; border-radius:5px;
            padding:2px 6px; font-weight:600;
        }
        .title-display {
            flex:1; font-weight:600; padding:6px 4px; cursor:pointer;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            font-size:0.95rem;
        }
        .title-display.empty { color:#aaa; font-style:italic; }
        .title-input {
            flex:1; border:1.5px solid var(--accent); border-radius:6px;
            padding:6px 8px; font-weight:600; display:none; font-size:0.95rem;
        }
        .edit-title-btn, .card-delete-btn {
            width:30px; height:30px; border-radius:50%;
            border:none; background:transparent; cursor:pointer;
            font-size:1rem; display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .edit-title-btn:hover { background:#eef; color:var(--accent); }
        .card-delete-btn:hover { background:#fee; color:var(--danger); }

        .card-body {
            padding:6px 12px 14px; position:relative; flex:1;
            display:flex; flex-direction:column;
        }
        .clear-content-btn {
            position:absolute; top:8px; right:16px;
            background:#f5f5f7; border:1px solid #ddd;
            border-radius:12px; padding:2px 8px; font-size:0.65rem;
            color:#666; cursor:pointer; z-index:2;
        }
        .clear-content-btn:hover { background:#ff5252; color:#fff; }
        .card-content-textarea {
            width:100%; flex:1; min-height:120px;
            border:1px solid #eee; border-radius:8px; padding:10px;
            font-family:'SF Mono','Consolas','Menlo',monospace;
            font-size:0.85rem; resize:vertical; line-height:1.6;
            margin-top:4px;
        }
        .toast-container {
            position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
            z-index:9999; pointer-events:none;
        }
        .toast {
            background:#333; color:#fff; padding:8px 18px; border-radius:16px;
            font-size:0.8rem; margin-top:6px; animation:toastIn 0.3s;
        }
        @keyframes toastIn{from{opacity:0;transform:translateY(10px);}}

        /* PDF 预览浮层 */
        .pdf-preview-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.4); z-index:10000;
            display:flex; align-items:center; justify-content:center;
            padding:20px;
        }
        .pdf-preview-card {
            width:780px; max-width:100%;
            background:#fff; border-radius:16px; padding:24px 28px;
            box-shadow:0 20px 50px rgba(0,0,0,0.3);
            position:relative; overflow-y:auto;
            /* 默认限制高度，导出时会临时移除 */
        }
        .pdf-preview-close {
            position:absolute; top:10px; right:14px;
            background:none; border:none; font-size:1.4rem; cursor:pointer; color:#999;
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .navbar {
                padding:6px 10px;
                gap:4px;
            }
            .navbar-brand {
                font-size:1rem;
            }
            .btn {
                padding:5px 10px; font-size:0.75rem; border-radius:16px;
                gap:2px;
            }
            .windows-grid {
                grid-template-columns: 1fr;
                gap:12px;
            }
            .card-header {
                padding:10px 10px 4px;
            }
            .card-body {
                padding:4px 10px 12px;
            }
            .title-display {
                font-size:0.9rem;
            }
            .card-content-textarea {
                font-size:0.8rem;
                min-height:100px;
            }
            .clear-content-btn {
                right:10px; top:6px; font-size:0.6rem; padding:2px 6px;
            }
        }
        @media (max-width: 400px) {
            .btn {
                padding:4px 8px; font-size:0.7rem;
            }
            .navbar-actions {
                gap:3px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📋 交易记录</div>
        <div class="navbar-actions">
            <button class="btn btn-outline btn-sm" id="btnAddWindow">＋ 添加</button>
            <button class="btn btn-danger btn-sm" id="btnClearAll">🗑️ 清空</button>
            <button class="btn btn-primary" id="btnExportPDF">📄 导出</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="windows-grid" id="windowsGrid"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = window.location.origin;
        let windowsData = [];
        let nextId = 0;

        async function loadFromServer() {
            try {
                const res = await fetch(`${API_BASE}/api/data`);
                const data = await res.json();
                windowsData = data.windows || [];
                nextId = data.nextId || 1;
            } catch (e) {
                windowsData = [{id:1,title:'',content:''},{id:2,title:'',content:''},{id:3,title:'',content:''}];
                nextId = 4;
            }
            render();
        }

        async function saveToServer() {
            try {
                await fetch(`${API_BASE}/api/data`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ windows: windowsData, nextId })
                });
            } catch (e) {
                showToast('保存失败，请检查网络');
            }
        }

        function showToast(msg) {
            const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2200);
        }

        function render() {
            const grid = document.getElementById('windowsGrid');
            grid.innerHTML = '';
            windowsData.forEach((win, idx) => grid.appendChild(createCard(win, idx)));
        }

        function createCard(win, idx) {
            const card = document.createElement('div'); card.className='window-card';
            const header = document.createElement('div'); header.className='card-header';
            const idxSpan = document.createElement('span'); idxSpan.className='window-index'; idxSpan.textContent=`#${idx+1}`;
            const titleDisplay = document.createElement('span');
            titleDisplay.className = 'title-display' + (win.title.trim()?'':' empty');
            titleDisplay.textContent = win.title.trim() || '未命名窗口';
            const titleInput = document.createElement('input'); titleInput.className='title-input'; titleInput.value=win.title;
            const editBtn = document.createElement('button'); editBtn.className='edit-title-btn'; editBtn.innerHTML='✎';
            const delBtn = document.createElement('button'); delBtn.className='card-delete-btn'; delBtn.innerHTML='✕';
            header.append(idxSpan, titleDisplay, titleInput, editBtn, delBtn);

            const body = document.createElement('div'); body.className='card-body';
            const clearBtn = document.createElement('button'); clearBtn.className='clear-content-btn'; clearBtn.textContent='清空';
            const textarea = document.createElement('textarea'); textarea.className='card-content-textarea'; textarea.value=win.content;
            body.append(clearBtn, textarea);
            card.append(header, body);

            function enterEdit() {
                titleDisplay.style.display='none'; titleInput.style.display='block';
                titleInput.value = win.title; titleInput.focus();
            }
            function exitEdit() {
                win.title = titleInput.value;
                titleDisplay.textContent = win.title.trim() || '未命名窗口';
                titleDisplay.className = 'title-display' + (win.title.trim()?'':' empty');
                titleDisplay.style.display=''; titleInput.style.display='none';
                saveToServer();
            }
            editBtn.addEventListener('click', enterEdit);
            titleInput.addEventListener('blur', exitEdit);
            titleInput.addEventListener('keydown', e => { if(e.key==='Enter') exitEdit(); });
            titleDisplay.addEventListener('dblclick', enterEdit);

            textarea.addEventListener('input', () => {
                win.content = textarea.value;
                clearTimeout(win._saveTimer);
                win._saveTimer = setTimeout(saveToServer, 600);
            });

            clearBtn.addEventListener('click', () => {
                if (win.content.trim() && !confirm('清空当前记录？')) return;
                win.content = '';
                textarea.value = '';
                saveToServer();
            });

            delBtn.addEventListener('click', () => {
                if ((win.title.trim()||win.content.trim()) && !confirm('删除窗口？')) return;
                windowsData = windowsData.filter(w => w.id!==win.id);
                saveToServer();
                render();
            });

            return card;
        }

        // 添加窗口
        document.getElementById('btnAddWindow').addEventListener('click', () => {
            windowsData.push({ id: nextId++, title:'', content:'' });
            saveToServer();
            render();
        });

        // 全部清空
        document.getElementById('btnClearAll').addEventListener('click', () => {
            if (!confirm('清空所有窗口的标题和内容？')) return;
            windowsData.forEach(w => { w.title=''; w.content=''; });
            saveToServer();
            render();
        });

        // 导出 PDF
        document.getElementById('btnExportPDF').addEventListener('click', () => {
            if (typeof html2pdf === 'undefined') {
                showToast('PDF库加载中，请稍后'); return;
            }
            if (windowsData.length === 0) {
                showToast('没有窗口可导出'); return;
            }

            const now = new Date();
            const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

            let html = `<div style="text-align:center; padding-bottom:16px; border-bottom:2px solid #eee; margin-bottom:20px;">
                <h1 style="margin:0; font-size:1.5rem;">交易记录汇总</h1>
                <p style="color:#888; margin:4px 0 0;">${dateStr}　共 ${windowsData.length} 个窗口</p>
            </div>`;

            windowsData.forEach((w, i) => {
                const title = w.title.trim() || '未命名窗口';
                const content = (w.content || '').trim() || '（无内容）';
                const escapedContent = content
                    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/\n/g,'<br>');
                html += `<div style="margin-bottom:18px; padding:12px 14px; border:1px solid #ddd; border-radius:8px; background:#fafafa;">
                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                        <span style="background:#eee; padding:1px 6px; border-radius:4px; font-size:0.7rem;">#${i+1}</span>
                        <strong style="font-size:0.95rem;">${title.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</strong>
                    </div>
                    <div style="white-space:pre-wrap; word-break:break-word; overflow-wrap:anywhere; font-family:monospace; font-size:0.8rem; background:#fff; padding:8px 10px; border-radius:6px; line-height:1.6;">${escapedContent}</div>
                </div>`;
            });

            // 创建预览浮层
            const overlay = document.createElement('div'); overlay.className='pdf-preview-overlay';
            const card = document.createElement('div'); card.className='pdf-preview-card';
            card.innerHTML = html;

            // 关闭按钮
            const closeBtn = document.createElement('button'); closeBtn.className='pdf-preview-close'; closeBtn.innerHTML='&times;';
            closeBtn.onclick = () => overlay.remove();
            card.appendChild(closeBtn);
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            // 导出前移除高度限制，确保全内容捕获
            const originalMaxHeight = card.style.maxHeight;
            const originalOverflow = card.style.overflowY;
            card.style.maxHeight = 'none';
            card.style.overflowY = 'visible';

            // 等待渲染
            setTimeout(() => {
                html2pdf().set({
                    margin: [8, 6, 8, 6],
                    filename: `交易记录_${dateStr.replace(/[:\s]/g,'_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, backgroundColor: '#ffffff', logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    // 不设置 pagebreak，让内容自动分页
                }).from(card).save().then(() => {
                    overlay.remove();
                    showToast('✅ PDF已下载');
                }).catch(() => {
                    overlay.remove();
                    showToast('导出失败，可尝试 Ctrl+P');
                }).finally(() => {
                    // 恢复样式（如果 overlay 还在）
                    if (card.parentNode) {
                        card.style.maxHeight = originalMaxHeight;
                        card.style.overflowY = originalOverflow;
                    }
                });
            }, 250);
        });

        // 键盘快捷键
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                windowsData.push({ id: nextId++, title:'', content:'' });
                saveToServer(); render();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('btnExportPDF').click();
            }
        });

        // 启动
        loadFromServer();
    </script>
</body>
</html>
