<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录管理器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --border: #e8e8ed;
            --accent: #0071e3;
            --danger: #ff3b30;
            --warning: #f57c00;
            --radius: 14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); min-height:100vh; line-height:1.5;
        }
        .navbar {
            position:sticky; top:0; z-index:100;
            background:rgba(255,255,255,0.9); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:8px 16px;
            display:flex; align-items:center; justify-content:space-between;
            gap:8px; flex-wrap:wrap;
        }
        .navbar-brand {
            display:flex; align-items:center; gap:6px; font-weight:700; font-size:1.1rem; white-space:nowrap;
        }
        .navbar-brand a { text-decoration:none; color:inherit; }
        .navbar-actions { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .btn {
            display:inline-flex; align-items:center; justify-content:center;
            gap:4px; padding:7px 12px; border-radius:18px;
            font-size:0.85rem; font-weight:500; cursor:pointer; border:none;
            transition:0.2s; font-family:inherit; background:#fff;
            white-space:nowrap; text-decoration:none;
        }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-outline { border:1.5px solid var(--border); }
        .btn-danger { border:1.5px solid #ffcccc; color:var(--danger); }
        .btn-warning { border:1.5px solid #ffe0b2; color: var(--warning); }
        .main-container { max-width:1300px; margin:0 auto; padding:16px; }
        .windows-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap:16px;
        }
        .window-card {
            background:#fff; border-radius:var(--radius);
            box-shadow:0 1px 4px rgba(0,0,0,0.06);
            border:1px solid var(--border);
            overflow: visible;
            display:flex; flex-direction:column;
        }
        .card-header { display:flex; align-items:center; gap:6px; padding:12px 12px 6px; }
        .window-index { font-size:0.7rem; background:#f0f0f5; border-radius:5px; padding:2px 6px; font-weight:600; }
        .title-display {
            flex:1; font-weight:600; padding:6px 4px; cursor:pointer;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:0.95rem;
        }
        .title-display.empty { color:#aaa; font-style:italic; }
        .title-input {
            flex:1; border:1.5px solid var(--accent); border-radius:6px;
            padding:6px 8px; font-weight:600; display:none; font-size:0.95rem;
        }
        .edit-title-btn, .card-delete-btn {
            width:30px; height:30px; border-radius:50%;
            border:none; background:transparent; cursor:pointer;
            font-size:1rem; display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .edit-title-btn:hover { background:#eef; color:var(--accent); }
        .card-delete-btn:hover { background:#fee; color:var(--danger); }
        .card-body { padding:6px 12px 14px; position:relative; display:flex; flex-direction:column; }
        .clear-content-btn {
            position:absolute; top:8px; right:16px;
            background:#f5f5f7; border:1px solid #ddd;
            border-radius:12px; padding:2px 8px; font-size:0.65rem;
            color:#666; cursor:pointer; z-index:2;
        }
        .clear-content-btn:hover { background:#ff5252; color:#fff; }
        .card-content-textarea {
            width:100%;
            border:1px solid #eee; border-radius:8px; padding:10px;
            font-family:'SF Mono','Consolas','Menlo',monospace;
            font-size:0.85rem;
            line-height:1.6; margin-top:4px;
            resize: none;          /* 彻底禁用原生手柄 */
            overflow-y: auto;
            /* 关键：移除 flex:1 和 min-height，完全由 JS 控制高度 */
            height: 120px;         /* 默认高度 */
        }
        /* 自定义拖拽手柄 */
        .resize-handle {
            height: 8px;
            background: #e0e0e0;
            border-radius: 0 0 8px 8px;
            cursor: ns-resize;
            transition: background 0.2s;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .resize-handle:hover {
            background: #0071e3;
        }
        .toast-container {
            position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
            z-index:9999; pointer-events:none;
        }
        .toast { background:#333; color:#fff; padding:8px 18px; border-radius:16px; font-size:0.8rem; margin-top:6px; animation:toastIn 0.3s; }
        @keyframes toastIn{from{opacity:0;transform:translateY(10px);}}

        .pdf-preview-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.4); z-index:10000;
            display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .pdf-preview-card {
            width:780px; max-width:100%;
            background:#fff; border-radius:16px; padding:24px 28px;
            box-shadow:0 20px 50px rgba(0,0,0,0.3);
            position:relative; overflow-y:auto;
        }
        .pdf-preview-close {
            position:absolute; top:10px; right:14px;
            background:none; border:none; font-size:1.4rem; cursor:pointer; color:#999;
        }

        @media (max-width: 600px) {
            .navbar { padding:6px 10px; gap:4px; }
            .navbar-brand { font-size:1rem; }
            .btn { padding:5px 10px; font-size:0.75rem; border-radius:16px; gap:2px; }
            .windows-grid { grid-template-columns: 1fr; gap:12px; }
            .card-header { padding:10px 10px 4px; }
            .card-body { padding:4px 10px 12px; }
            .title-display { font-size:0.9rem; }
            .card-content-textarea { font-size:0.8rem; }
            .clear-content-btn { right:10px; top:6px; font-size:0.6rem; padding:2px 6px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/">🏠 Tempest07</a> <span style="margin:0 4px; color:#ccc;">/</span> 📋 交易记录
        </div>
        <div class="navbar-actions">
            <button class="btn btn-outline btn-sm" id="btnAddWindow">＋ 添加</button>
            <button class="btn btn-warning btn-sm" id="btnClearTexts">📝 清空文本</button>
            <button class="btn btn-danger btn-sm" id="btnClearAll">🗑️ 全部清空</button>
            <button class="btn btn-primary" id="btnExportPDF">📄 导出</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="windows-grid" id="windowsGrid"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const BASE_URL = 'https://tempest07.weiqian-yu.workers.dev';
        let windowsData = [];
        let nextId = 0;

        async function loadFromServer() {
            try {
                const res = await fetch(`${BASE_URL}/api/data`);
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                windowsData = data.windows || [];
                nextId = data.nextId || 1;
            } catch (e) {
                windowsData = [
                    { id: 1, title: '', content: '' },
                    { id: 2, title: '', content: '' },
                    { id: 3, title: '', content: '' }
                ];
                nextId = 4;
                showToast('⚠️ 无法连接服务器，已载入默认窗口');
            }
            render();
        }

        async function saveToServer() {
            try {
                await fetch(`${BASE_URL}/api/data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ windows: windowsData, nextId })
                });
            } catch (e) {
                showToast('⚠️ 保存失败，请检查网络');
            }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 2200);
        }

        function render() {
            const grid = document.getElementById('windowsGrid');
            grid.innerHTML = '';
            windowsData.forEach((win, idx) => grid.appendChild(createCard(win, idx)));
        }

        function createCard(win, idx) {
            const card = document.createElement('div');
            card.className = 'window-card';

            const header = document.createElement('div');
            header.className = 'card-header';

            const idxSpan = document.createElement('span');
            idxSpan.className = 'window-index';
            idxSpan.textContent = `#${idx + 1}`;

            const titleDisplay = document.createElement('span');
            titleDisplay.className = 'title-display' + (win.title.trim() ? '' : ' empty');
            titleDisplay.textContent = win.title.trim() || '未命名窗口';

            const titleInput = document.createElement('input');
            titleInput.className = 'title-input';
            titleInput.value = win.title;

            const editBtn = document.createElement('button');
            editBtn.className = 'edit-title-btn';
            editBtn.innerHTML = '✎';
            editBtn.title = '编辑标题';

            const delBtn = document.createElement('button');
            delBtn.className = 'card-delete-btn';
            delBtn.innerHTML = '✕';
            delBtn.title = '删除窗口';

            header.append(idxSpan, titleDisplay, titleInput, editBtn, delBtn);

            const body = document.createElement('div');
            body.className = 'card-body';

            const clearBtn = document.createElement('button');
            clearBtn.className = 'clear-content-btn';
            clearBtn.textContent = '清空';

            const textarea = document.createElement('textarea');
            textarea.className = 'card-content-textarea';
            textarea.value = win.content;
            textarea.placeholder = '在此粘贴交易记录...';

            // 自定义拖拽手柄
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            resizeHandle.title = '拖动调整高度';

            body.append(clearBtn, textarea, resizeHandle);
            card.append(header, body);

            // ----- 拖拽逻辑 (修正：直接设置高度，同时阻止浏览器默认拖拽图片行为) -----
            let startY, startHeight;
            function onMouseDown(e) {
                e.preventDefault();
                startY = e.clientY;
                startHeight = textarea.clientHeight; // 获取当前实际高度
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            }
            function onMouseMove(e) {
                const delta = e.clientY - startY;
                const newHeight = Math.max(80, startHeight + delta);
                textarea.style.height = newHeight + 'px';
                // 确保不会因为 flex 属性而受影响，显式设置 flex 为 none
                textarea.style.flex = 'none';
            }
            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
            resizeHandle.addEventListener('mousedown', onMouseDown);

            // 触摸事件支持
            resizeHandle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                startY = touch.clientY;
                startHeight = textarea.clientHeight;
                document.addEventListener('touchmove', onTouchMove);
                document.addEventListener('touchend', onTouchEnd);
            });
            function onTouchMove(e) {
                const touch = e.touches[0];
                const delta = touch.clientY - startY;
                const newHeight = Math.max(80, startHeight + delta);
                textarea.style.height = newHeight + 'px';
                textarea.style.flex = 'none';
            }
            function onTouchEnd() {
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }

            // 标题编辑
            function enterEdit() {
                titleDisplay.style.display = 'none';
                titleInput.style.display = 'block';
                titleInput.value = win.title;
                titleInput.focus();
            }
            function exitEdit() {
                win.title = titleInput.value;
                titleDisplay.textContent = win.title.trim() || '未命名窗口';
                titleDisplay.className = 'title-display' + (win.title.trim() ? '' : ' empty');
                titleDisplay.style.display = '';
                titleInput.style.display = 'none';
                saveToServer();
            }
            editBtn.addEventListener('click', enterEdit);
            titleInput.addEventListener('blur', exitEdit);
            titleInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') exitEdit();
            });
            titleDisplay.addEventListener('dblclick', enterEdit);

            // 内容编辑
            textarea.addEventListener('input', () => {
                win.content = textarea.value;
                clearTimeout(win._saveTimer);
                win._saveTimer = setTimeout(saveToServer, 800);
            });

            // 清空当前记录
            clearBtn.addEventListener('click', () => {
                if (win.content.trim() && !confirm('确定清空当前窗口的记录吗？')) return;
                win.content = '';
                textarea.value = '';
                saveToServer();
            });

            // 删除窗口
            delBtn.addEventListener('click', () => {
                if ((win.title.trim() || win.content.trim()) && !confirm('确定删除这个窗口吗？')) return;
                windowsData = windowsData.filter(w => w.id !== win.id);
                saveToServer();
                render();
            });

            return card;
        }

        document.getElementById('btnAddWindow').addEventListener('click', () => {
            windowsData.push({ id: nextId++, title: '', content: '' });
            saveToServer();
            render();
        });

        document.getElementById('btnClearTexts').addEventListener('click', () => {
            if (windowsData.length === 0) { showToast('没有窗口'); return; }
            if (!confirm('确定清空所有窗口的交易记录内容吗？（标题保留）')) return;
            windowsData.forEach(w => { w.content = ''; });
            saveToServer();
            render();
            showToast('✅ 内容已清空');
        });

        document.getElementById('btnClearAll').addEventListener('click', () => {
            if (!confirm('确定清空所有窗口的标题和内容吗？')) return;
            windowsData.forEach(w => { w.title = ''; w.content = ''; });
            saveToServer();
            render();
        });

        document.getElementById('btnExportPDF').addEventListener('click', () => {
            if (typeof html2pdf === 'undefined') { showToast('PDF库加载中'); return; }
            if (windowsData.length === 0) { showToast('没有窗口'); return; }

            const now = new Date();
            const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            let html = `<div style="text-align:center; padding-bottom:16px; border-bottom:2px solid #eee; margin-bottom:20px;">
                <h1 style="margin:0; font-size:1.5rem;">交易记录汇总</h1>
                <p style="color:#888;">${dateStr}　共 ${windowsData.length} 个窗口</p></div>`;
            windowsData.forEach((w, i) => {
                const title = w.title.trim() || '未命名窗口';
                const content = (w.content || '').replace(/</g, '&lt;').replace(/\n/g, '<br>');
                html += `<div style="margin-bottom:18px; padding:12px; border:1px solid #ddd; border-radius:8px; page-break-inside:avoid;">
                    <strong>#${i + 1} ${title}</strong>
                    <div style="white-space:pre-wrap; word-break:break-word; margin-top:6px;">${content}</div></div>`;
            });
            const overlay = document.createElement('div'); overlay.className = 'pdf-preview-overlay';
            const card = document.createElement('div'); card.className = 'pdf-preview-card';
            card.innerHTML = html + '<button class="pdf-preview-close">&times;</button>';
            card.querySelector('.pdf-preview-close').onclick = () => overlay.remove();
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.style.maxHeight = 'none'; card.style.overflowY = 'visible';
            setTimeout(() => {
                html2pdf().set({
                    margin: [8, 6, 8, 6],
                    filename: `交易记录_${dateStr.replace(/[:\s]/g, '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, backgroundColor: '#ffffff', logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['css', 'legacy'] }
                }).from(card).save().then(() => overlay.remove()).catch(() => {
                    overlay.remove();
                    showToast('导出失败');
                });
            }, 250);
        });

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                windowsData.push({ id: nextId++, title: '', content: '' });
                saveToServer(); render();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('btnExportPDF').click();
            }
        });

        loadFromServer();
    </script>
</body>
</html>
